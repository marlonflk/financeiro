  <script>
    var mapaContas = {};

    function obtenerDataHoje() {
      var hoje = new Date();
      return hoje.getFullYear() + '-' + String(hoje.getMonth() + 1).padStart(2, '0') + '-' + String(hoje.getDate()).padStart(2, '0');
    }

    function definirCategoriaPadrao() {
      var catSelect = document.getElementById('categoria');
      for (var i = 0; i < catSelect.options.length; i++) {
        if (catSelect.options[i].value.toUpperCase().includes("SUPERMERCADO")) {
          catSelect.selectedIndex = i; break;
        }
      }
      verificarSeETransferencia();
    }

    function tentarFocarValor() {
      var loginVisivel = document.getElementById('telaLogin').style.display !== 'none';
      var formVisivel = document.getElementById('form').style.display === 'block';
      if (!loginVisivel && formVisivel) {
        setTimeout(function() {
          var inputValor = document.getElementById('valor');
          if (inputValor && document.activeElement !== inputValor) {
            inputValor.focus();
            var len = inputValor.value.length;
            inputValor.setSelectionRange(len, len);
          }
        }, 150);
      }
    }

    function verificarSeETransferencia() {
      var cat = document.getElementById('categoria').value.toUpperCase();
      var isTransf = (cat.indexOf('TRANSFER') !== -1 || cat.indexOf('FATURA') !== -1);
      var isReceitaCat = (cat.indexOf('RECEITA') !== -1);
      
      var blocoTransf = document.getElementById('grupoContaDestino');
      var blocoOpcoes = document.getElementById('blocoOpcoesNormais');
      var labelContaOrigem = document.getElementById('labelContaOrigem');
      var inputNomeDest = document.getElementById('nomeDestino');
      var inputContaDest = document.getElementById('contaDestino');
      var inputEhReceita = document.getElementById('ehReceita');

      if (isTransf) {
        blocoTransf.style.display = 'block'; blocoOpcoes.style.display = 'none';
        labelContaOrigem.innerText = 'Conta Origem (Sai de)'; labelContaOrigem.style.color = '#ef4444';
        inputNomeDest.setAttribute('required', 'required');
        inputContaDest.setAttribute('required', 'required');
        if(document.getElementById('descricao').value === '') document.getElementById('descricao').value = 'Transferência / Pgto Fatura';
      } else {
        blocoTransf.style.display = 'none'; blocoOpcoes.style.display = 'block';
        labelContaOrigem.innerText = 'Conta/Cartão'; labelContaOrigem.style.color = 'var(--text-muted)';
        inputNomeDest.removeAttribute('required');
        inputContaDest.removeAttribute('required');

        // Mantém o botão de receita sempre visível
        document.getElementById('areaToggleReceita').style.display = 'flex';
        
        // Sincroniza o botão de receita caso o usuário tenha escolhido "Receitas" diretamente no select
        inputEhReceita.checked = isReceitaCat;
      }
    }

    function atualizarContasOrigem() {
      var nome = document.getElementById('nome').value;
      var contaSelect = document.getElementById('conta');
      if(!contaSelect) return;
      contaSelect.innerHTML = '';
      (mapaContas[nome] || []).forEach(function(c) {
        var opt = document.createElement('option'); opt.value = c; opt.textContent = c;
        contaSelect.appendChild(opt);
      });
      var savedConta = localStorage.getItem('appFin_conta') || "Cartão Latam";
      if (Array.from(contaSelect.options).some(function(o) { return o.value === savedConta; })) contaSelect.value = savedConta;
      if (contaSelect.value) localStorage.setItem('appFin_conta', contaSelect.value);
    }

    function atualizarContasDestino() {
      var nomeDest = document.getElementById('nomeDestino').value;
      var contaDestinoSelect = document.getElementById('contaDestino');
      if(!contaDestinoSelect) return;
      contaDestinoSelect.innerHTML = '';
      (mapaContas[nomeDest] || []).forEach(function(c) {
        var opt = document.createElement('option'); opt.value = c; opt.textContent = c;
        contaDestinoSelect.appendChild(opt);
      });
    }

    function aplicarDadosNaTela(dados) {
      if(!dados || dados.nomes.includes("Erro")) return;
      
      document.getElementById('status').style.display = 'none';
      document.getElementById('form').style.display = 'block';
      document.getElementById('valSaldo').innerText = dados.saldo || "R$ 0,00";
      document.getElementById('valGastoDiario').innerText = dados.gastoDiario || "R$ 0,00";
      document.getElementById('miniDash').style.display = 'flex';

      var savedNome = localStorage.getItem('appFin_nome') || "Familiar";
      var nomeSelect = document.getElementById('nome');
      var nomeDestinoSelect = document.getElementById('nomeDestino');
      
      nomeSelect.innerHTML = ""; nomeDestinoSelect.innerHTML = "";

      if (dados.nomes && dados.nomes.length > 0) {
        dados.nomes.forEach(function(n) {
          var opt = document.createElement('option'); opt.value = n; opt.textContent = n;
          nomeSelect.appendChild(opt);
          var opt2 = document.createElement('option'); opt2.value = n; opt2.textContent = n;
          nomeDestinoSelect.appendChild(opt2);
        });
        if (Array.from(nomeSelect.options).some(function(o) { return o.value === savedNome; })) nomeSelect.value = savedNome;
        nomeDestinoSelect.value = nomeSelect.value; 
      }

      var catSelect = document.getElementById('categoria');
      catSelect.innerHTML = "";
      if (dados.categorias && dados.categorias.length > 0) {
        dados.categorias.forEach(function(c) {
          var opt = document.createElement('option'); opt.value = c; opt.textContent = c;
          catSelect.appendChild(opt);
        });
        definirCategoriaPadrao();
      }

      mapaContas = dados.mapaContas || {};
      atualizarContasOrigem();
      atualizarContasDestino();
      tentarFocarValor();
    }

    document.addEventListener("DOMContentLoaded", function() {
      var acessoLiberado = localStorage.getItem("auth_meu_financeiro");
      if (acessoLiberado === "sim") liberarTela();

      var cacheConfig = localStorage.getItem("appFin_config_cache");
      if (cacheConfig) {
        try {
          aplicarDadosNaTela(JSON.parse(cacheConfig));
        } catch(e) { console.log("Cache indisponível."); }
      }

      document.getElementById('data').value = obtenerDataHoje();
      var selectRealizada = document.getElementById('realizada');
      selectRealizada.addEventListener('change', function() {
        if (this.value === 'Sim') this.className = 'bg-sim';
        else if (this.value === 'Não') this.className = 'bg-nao';
        else if (this.value === 'Arq.') this.className = 'bg-arq';
      });

      document.getElementById('numParcelas').addEventListener('input', function() {
        document.getElementById('detalhe').value = (this.value.trim() !== "" && parseInt(this.value) > 1) ? "Parcelado" : "";
        var inputValor = document.getElementById('valor').value;
        var divResumo = document.getElementById('resumoParcelas');
        var numParc = parseInt(this.value) || 0;
        var floatValor = parseFloat(inputValor.replace(/\./g, '').replace(',', '.')) || 0;
        if (numParc > 1 && floatValor > 0) {
          divResumo.innerHTML = 'Total: R$ ' + (floatValor * numParc).toLocaleString("pt-BR", { minimumFractionDigits: 2 });
          divResumo.style.display = 'block';
        } else { divResumo.style.display = 'none'; }
      });

      document.getElementById('valor').addEventListener('input', function(e) {
        mascaraMoeda(e.target);
        document.getElementById('numParcelas').dispatchEvent(new Event('input'));
      });

      document.getElementById('categoria').addEventListener('change', verificarSeETransferencia);
      
      // NOVA AÇÃO INTELIGENTE: Sincroniza a categoria quando clica no botão "É Receita?"
      document.getElementById('ehReceita').addEventListener('change', function() {
        var catSelect = document.getElementById('categoria');
        if (this.checked) {
          // Se marcou o botão, procura a categoria que contém a palavra "RECEITA"
          for (var i = 0; i < catSelect.options.length; i++) {
            if (catSelect.options[i].value.toUpperCase().indexOf("RECEITA") !== -1) {
              catSelect.selectedIndex = i;
              break;
            }
          }
        } else {
          // Se desmarcou, volta para a despesa padrão
          definirCategoriaPadrao();
        }
        verificarSeETransferencia(); // Atualiza a tela por precaução
      });

      document.getElementById('nome').addEventListener('change', function() { localStorage.setItem('appFin_nome', this.value); atualizarContasOrigem(); });
      document.getElementById('nomeDestino').addEventListener('change', atualizarContasDestino);
      document.getElementById('conta').addEventListener('change', function() { localStorage.setItem('appFin_conta', this.value); });

      google.script.run
        .withFailureHandler(function(erro) {
          if(!cacheConfig) {
            var status = document.getElementById('status');
            status.className = 'erro-critico'; status.innerHTML = 'FALHA DE CONEXÃO:<br>' + erro.message;
          }
        })
        .withSuccessHandler(function(dados) {
          if(dados && !dados.nomes.includes("Erro")) {
            localStorage.setItem("appFin_config_cache", JSON.stringify(dados));
            aplicarDadosNaTela(dados);
          }
        })
        .getDadosFormulario();

      document.getElementById('form').addEventListener('submit', function(e) {
        e.preventDefault();
        var btn = document.getElementById('btnSalvarL');
        var textoOriginal = btn.innerHTML;
        btn.innerHTML = 'Enviando...'; btn.style.opacity = '0.7'; btn.disabled = true;

        google.script.run
          .withFailureHandler(function(erro) { 
            var notifDiv = document.getElementById('notificacao');
            notifDiv.className = 'erro-critico'; notifDiv.style.display = 'block';
            notifDiv.innerHTML = 'ERRO AO LANÇAR:<br>' + erro.message;
            btn.innerHTML = textoOriginal; btn.style.opacity = '1'; btn.disabled = false;
          })
          .withSuccessHandler(function(resultado) {
            if (resultado && resultado.sucesso) {
              document.getElementById('valSaldo').innerText = resultado.saldo;
              document.getElementById('valGastoDiario').innerText = resultado.gastoDiario;

              var cacheConfig = localStorage.getItem("appFin_config_cache");
              if (cacheConfig) {
                try {
                  var obj = JSON.parse(cacheConfig);
                  obj.saldo = resultado.saldo;
                  obj.gastoDiario = resultado.gastoDiario;
                  localStorage.setItem("appFin_config_cache", JSON.stringify(obj));
                } catch(e) { console.log("Falha ao sincronizar cache local."); }
              }
            }

            var notifDiv = document.getElementById('notificacao');
            notifDiv.className = 'sucesso-msg'; notifDiv.style.display = 'block';
            notifDiv.innerHTML = '✓ Lançamento adicionado!';
            setTimeout(function() { notifDiv.style.display = 'none'; }, 4000);
            
            document.getElementById('descricao').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('numParcelas').value = '';
            document.getElementById('resumoParcelas').style.display = 'none';
            document.getElementById('detalhe').value = '';
            document.getElementById('data').value = obtenerDataHoje();
            
            definirCategoriaPadrao(); // Volta a categoria para a despesa
            document.getElementById('ehReceita').checked = false; // Desliga o botão de receita

            selectRealizada.value = 'Sim'; selectRealizada.className = 'bg-sim';
            
            btn.innerHTML = textoOriginal; btn.style.opacity = '1'; btn.disabled = false;
            tentarFocarValor();
          })
          .lancarNovoWebApp({
            nome: document.getElementById('nome').value, conta: document.getElementById('conta').value,
            nomeDestino: document.getElementById('nomeDestino').value, contaDestino: document.getElementById('contaDestino').value, 
            data: document.getElementById('data').value, realizada: document.getElementById('realizada').value,
            descricao: document.getElementById('descricao').value, categoria: document.getElementById('categoria').value,
            valor: document.getElementById('valor').value.replace(/\./g, '').replace(',', '.'),
            ehReceita: document.getElementById('ehReceita').checked, numParcelas: document.getElementById('numParcelas').value,
            detalhe: document.getElementById('detalhe').value
          });
      });
    });

    function verificarAcesso() {
      var senha = document.getElementById("inputSenha").value;
      var btn = document.getElementById("btnEntrar");
      if (!senha) return;
      btn.disabled = true; btn.innerText = "Verificando...";
      google.script.run
        .withSuccessHandler(function(res) {
          if (res.sucesso) { localStorage.setItem("auth_meu_financeiro", "sim"); liberarTela(); }
          else { document.getElementById("loginMsgErro").style.display = "block"; btn.disabled = false; btn.innerText = "Acessar"; document.getElementById("inputSenha").value = ""; }
        })
        .validarSenhaApp(senha);
    }

    function liberarTela() {
      document.getElementById("telaLogin").style.display = "none";
      document.getElementById("conteudoPrincipal").style.display = "block";
      tentarFocarValor();
    }
    document.getElementById("inputSenha").addEventListener("keypress", function(e) { if (e.key === "Enter") verificarAcesso(); });
  </script>
</body>
</html>
