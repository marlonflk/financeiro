<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Financeiro Marlon</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{

    height:100vh;
    display:flex;
    flex-direction:column;
    background:#08111f;

}


/* CABEÇALHO */

header{

    height:65px;
    background:#0f172a;
    color:white;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 25px;

    box-shadow:0 2px 10px rgba(0,0,0,.3);

}


.logo{

    font-size:24px;
    font-weight:bold;

}


.logo span{

    color:#38bdf8;

}


.usuario{

    font-size:14px;
    color:#cbd5e1;

}



/* ÁREA PRINCIPAL */


.container{

    flex:1;
    display:flex;

}



/* MENU */


.menu{

    width:230px;
    background:#111827;

    padding:20px;

    color:white;

}


.menu h3{

    margin-bottom:25px;
    color:#38bdf8;

}


.menu a{

    display:block;

    color:#cbd5e1;

    text-decoration:none;

    padding:12px;

    margin-bottom:8px;

    border-radius:8px;

}


.menu a:hover{

    background:#1e293b;
    color:white;

}



/* ÁREA DO SISTEMA */


.conteudo{

    flex:1;
    background:#e5e7eb;

}


iframe{

    width:100%;

    height:100%;

    border:none;

}



/* CELULAR */


@media(max-width:800px){


.menu{

    display:none;

}


.logo{

    font-size:18px;

}


}



</style>


</head>


<body>


<header>


<div class="logo">

Financeiro <span>Marlon</span>

</div>


<div class="usuario">

Sistema Online

</div>


</header>




<div class="container">



<nav class="menu">


<h3>

Menu

</h3>


<a href="#">

🏠 Início

</a>


<a href="#">

📊 Dashboard

</a>


<a href="#">

💰 Lançamentos

</a>


<a href="#">

💳 Cartões

</a>


<a href="#">

🏦 Bancos

</a>


<a href="#">

📈 Investimentos

</a>



</nav>





<div class="conteudo">


<iframe

src="https://script.google.com/macros/s/AKfycbwZvSapiG8W1X-IkzPmoVhlwGC5N83p-PpmTXO1HrXR-9W73qyKzoGl0UjlZ6BGZEz5Sg/exec"

allowfullscreen>

</iframe>


</div>



</div>


</body>

</html>
